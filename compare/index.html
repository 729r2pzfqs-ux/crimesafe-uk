<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CK531DR9X9"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-CK531DR9X9');</script>
    <title>Compare Neighbourhoods | Side-by-Side Crime Comparison | CrimeSafe UK</title>
    <meta name="description" content="Compare crime rates between any two UK neighbourhoods. See safety scores, crime types, and statistics side-by-side.">
    <link rel="canonical" href="https://crimesafe.uk/compare/">
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="theme-color" content="#01696F">
    <style>
        .compare-form { display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-8); }
        .compare-input { position: relative; flex: 1; min-width: 200px; }
        .compare-input input { width: 100%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-lg); border: 1px solid var(--color-border); background: var(--color-surface); font-size: var(--text-base); }
        .compare-input input:focus { outline: none; border-color: var(--color-primary); }
        .compare-vs { font-weight: 700; color: var(--color-text-muted); }
        .compare-btn { padding: var(--space-3) var(--space-6); background: var(--color-primary); color: white; border-radius: var(--radius-lg); font-weight: 600; cursor: pointer; border: none; }
        .compare-btn:hover { background: var(--color-primary-hover); }
        .compare-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); max-height: 300px; overflow-y: auto; z-index: 100; display: none; box-shadow: var(--shadow-lg); }
        .dropdown.open { display: block; }
        .dropdown-item { padding: var(--space-3) var(--space-4); cursor: pointer; border-bottom: 1px solid var(--color-divider); }
        .dropdown-item:hover { background: var(--color-surface-offset); }
        .dropdown-item:last-child { border-bottom: none; }
        .comparison-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--space-4); }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                <svg width="28" height="28" viewBox="0 0 512 512" fill="none">
                    <path d="M256 52L88 140v120c0 104 72 192 168 224 96-32 168-120 168-224V140L256 52z" fill="currentColor" opacity="0.1"/>
                    <path d="M256 52L88 140v120c0 104 72 192 168 224 96-32 168-120 168-224V140L256 52z" fill="none" stroke="currentColor" stroke-width="20" stroke-linejoin="round"/>
                    <text x="256" y="320" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="160" fill="currentColor">UK</text>
                </svg>
                <span>CrimeSafe UK</span>
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/streets/">Streets</a>
                <a href="/compare/">Compare</a>
                <a href="/forces/">Forces</a>
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: var(--space-8); padding-bottom: var(--space-16);">
        <nav class="breadcrumb" style="margin-bottom: var(--space-6);">
            <a href="/">Home</a> › <span>Compare</span>
        </nav>

        <h1 style="font-size: var(--text-2xl); margin-bottom: var(--space-2);">Compare Neighbourhoods</h1>
        <p style="color: var(--color-text-muted); margin-bottom: var(--space-6);">
            Compare crime rates and safety scores between any two UK neighbourhoods.
        </p>

        <div class="compare-form">
            <div class="compare-input">
                <input type="text" id="area1" placeholder="First area..." autocomplete="off">
                <div class="dropdown" id="dropdown1"></div>
            </div>
            <span class="compare-vs">vs</span>
            <div class="compare-input">
                <input type="text" id="area2" placeholder="Second area..." autocomplete="off">
                <div class="dropdown" id="dropdown2"></div>
            </div>
            <button class="compare-btn" id="compareBtn" onclick="doCompare()" disabled>Compare</button>
        </div>
        <p style="text-align: center; color: var(--color-text-muted); margin-bottom: var(--space-8);">Compare UK cities or neighbourhoods in London, Manchester &amp; Birmingham</p>

        <h2 style="font-size: var(--text-xl); margin-bottom: var(--space-4);">Popular Comparisons</h2>
        <div class="comparison-grid" id="popularList">
            <!-- Populated by JS -->
        </div>
    </main>

    <script>
        // Sample neighbourhoods for autocomplete
        let neighbourhoods = [];
        let selected1 = null, selected2 = null;

        // Load neighbourhood data
        async function loadNeighbourhoods() {
            try {
                const resp = await fetch('/data/rankings.json');
                if (resp.ok) {
                    const data = await resp.json();
                    neighbourhoods = (data.neighbourhoods || []).map(n => ({
                        name: n.name,
                        slug: n.slug || n.name.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                        score: n.score
                    }));
                }
            } catch (e) {
                console.error('Failed to load neighbourhoods:', e);
            }
        }

        function slugify(name) {
            return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }

        function setupAutocomplete(inputId, dropdownId, onSelect) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);

            input.addEventListener('input', () => {
                const query = input.value.toLowerCase();
                if (query.length < 2) {
                    dropdown.classList.remove('open');
                    return;
                }

                const matches = neighbourhoods.filter(n => 
                    n.name.toLowerCase().includes(query)
                ).slice(0, 10);

                if (matches.length === 0) {
                    dropdown.classList.remove('open');
                    return;
                }

                dropdown.innerHTML = matches.map(n => 
                    `<div class="dropdown-item" data-slug="${n.slug}" data-name="${n.name}">${n.name} <span style="color:var(--color-text-muted)">(${n.score}/100)</span></div>`
                ).join('');
                dropdown.classList.add('open');

                dropdown.querySelectorAll('.dropdown-item').forEach(item => {
                    item.addEventListener('click', () => {
                        input.value = item.dataset.name;
                        onSelect({ name: item.dataset.name, slug: item.dataset.slug });
                        dropdown.classList.remove('open');
                        updateButton();
                    });
                });
            });

            input.addEventListener('blur', () => {
                setTimeout(() => dropdown.classList.remove('open'), 200);
            });
        }

        function updateButton() {
            document.getElementById('compareBtn').disabled = !(selected1 && selected2);
        }

        function doCompare() {
            if (!selected1 || !selected2) return;
            const url = `/compare/${selected1.slug}-vs-${selected2.slug}/`;
            window.location.href = url;
        }

        // Load popular comparisons from existing folders
        async function loadPopularComparisons() {
            const popular = [
                { a: 'Abbey Road', b: 'Arsenal', slugA: 'abbey-road', slugB: 'arsenal' },
                { a: 'Abbey Road', b: 'Balham', slugA: 'abbey-road', slugB: 'balham' },
                { a: 'Abbey Road', b: 'Barnes', slugA: 'abbey-road', slugB: 'barnes' },
                { a: 'Abbey Road', b: 'Brixton', slugA: 'abbey-road', slugB: 'brixton-hill' },
                { a: 'Abbey Road', b: 'Camden Town', slugA: 'abbey-road', slugB: 'camden-town-with-primrose-hill' },
                { a: 'Abbey Road', b: 'Fulham', slugA: 'abbey-road', slugB: 'fulham-reach' }
            ];

            const list = document.getElementById('popularList');
            list.innerHTML = popular.map(p => `
                <a href="/compare/${p.slugA}-vs-${p.slugB}/" class="card" style="padding: var(--space-4); text-decoration: none;">
                    <div style="font-weight: 600;">${p.a} vs ${p.b}</div>
                    <div style="color: var(--color-text-muted); font-size: var(--text-sm);">View comparison →</div>
                </a>
            `).join('');
        }

        // Initialize
        loadNeighbourhoods();
        loadPopularComparisons();
        
        setupAutocomplete('area1', 'dropdown1', (item) => { selected1 = item; });
        setupAutocomplete('area2', 'dropdown2', (item) => { selected2 = item; });

        // Theme
        const toggle = document.getElementById('themeToggle');
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        toggle?.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            toggle.textContent = next === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
